sonar.projectKey=welbinator_form-handler-wp
sonar.organization=welbinator
sonar.projectName=Form Handler WP
sonar.projectVersion=1.3.0

# Source
sonar.sources=.
sonar.exclusions=vendor/**,node_modules/**,tests/**,*.min.js

# Tests
sonar.tests=tests
sonar.test.inclusions=tests/**/*Test.php,tests/**/*Cest.php

# PHP
sonar.php.version=7.4

# Exclude generated Codeception support files from analysis
sonar.coverage.exclusions=tests/Support/**

# Rule exclusions — WordPress coding standards conflict with Sonar defaults
# snake_case naming: WP mandates it for functions, classes, methods, and variables.
# Tab indentation: WP mandates tabs (PHPCS enforces this).
# NULL capitalisation: WP style guide uses uppercase NULL.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

# snake_case function/class names
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S101
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.php
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S100
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.php
sonar.issue.ignore.multicriteria.e3.ruleKey=php:S116
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.php

# Tab indentation (WP mandates tabs)
sonar.issue.ignore.multicriteria.e4.ruleKey=php:S1120
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.php

# Codeception $I / _before conventions in test files
sonar.issue.ignore.multicriteria.e5.ruleKey=php:S100
sonar.issue.ignore.multicriteria.e5.resourceKey=tests/**
