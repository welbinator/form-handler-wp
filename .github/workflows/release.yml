name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update plugin header version
        run: |
          sed -i "s/^ \* Version:.*/ * Version:           ${{ steps.version.outputs.VERSION }}/" form-handler-wp.php
          sed -i "s/define( 'FHW_VERSION', '[^']*' );/define( 'FHW_VERSION', '${{ steps.version.outputs.VERSION }}' );/" form-handler-wp.php

      - name: Build plugin zip
        run: |
          # Stage into a folder named exactly form-handler-wp
          # so WordPress recognises it as the same plugin on update
          mkdir -p /tmp/build/form-handler-wp

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpstan.neon' \
            --exclude='test-form.html' \
            ./ /tmp/build/form-handler-wp/

          cd /tmp/build
          zip -r $GITHUB_WORKSPACE/form-handler-wp.zip form-handler-wp/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Form Handler WP v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: form-handler-wp.zip
          draft: false
          prerelease: false
