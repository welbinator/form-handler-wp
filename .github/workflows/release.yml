name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update plugin header version
        run: |
          sed -i "s/^ \* Version:.*/ * Version:           ${{ steps.version.outputs.VERSION }}/" form-handler-wp.php
          sed -i "s/define( 'FHW_VERSION', '[^']*' );/define( 'FHW_VERSION', '${{ steps.version.outputs.VERSION }}' );/" form-handler-wp.php

      - name: Build plugin zip
        run: |
          PLUGIN_SLUG="form-handler-wp"
          RELEASE_DIR="/tmp/${PLUGIN_SLUG}"
          ZIP_NAME="${PLUGIN_SLUG}-${{ steps.version.outputs.VERSION }}.zip"

          # Copy into a clean folder named after the plugin slug
          # WordPress matches the folder name to the installed plugin slug on update
          rsync -r \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpstan.neon' \
            --exclude='phpstan-bootstrap.php' \
            --exclude='test-form.html' \
            --exclude='test-form-snippet.html' \
            --exclude='*.sh' \
            ./ "${RELEASE_DIR}/"

          cd /tmp
          zip -r "${ZIP_NAME}" "${PLUGIN_SLUG}/"

          echo "ZIP_PATH=/tmp/${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Form Handler WP v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
